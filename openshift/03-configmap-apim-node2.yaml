apiVersion: v1
kind: ConfigMap
metadata:
  name: apim-node2-config
  namespace: wso2-apim
data:
  deployment.toml: |
    [server]
    hostname = "api.am.wso2.com"
    offset=1
    base_path = "${carbon.protocol}://${carbon.host}:${carbon.management.port}"
    server_role = "default"

    [transport.https.properties]
    proxyPort = 443

    [super_admin]
    username = "admin"
    password = "admin"
    create_admin_account = false

    [user_store]
    type = "database_unique_id"

    [database.apim_db]
    type = "mysql"
    driver="com.mysql.cj.jdbc.Driver"
    url = "jdbc:mysql://apim-ha.ccoejcr5bqzj.eu-north-1.rds.amazonaws.com:3306/ha_apim_db?useSSL=false"
    username = "apimadmin"
    password = "apimadmin"
    pool_options.defaultAutoCommit = true
    pool_options.testOnBorrow = true
    pool_options.testWhileIdle = true
    pool_options.maxActive = 100
    pool_options.maxWait = 10000
    pool_options.validationInterval = 10000

    [database.shared_db]
    type = "mysql"
    driver="com.mysql.cj.jdbc.Driver"
    url = "jdbc:mysql://apim-ha.ccoejcr5bqzj.eu-north-1.rds.amazonaws.com:3306/ha_shared_db?useSSL=false"
    username = "sharedadmin"
    password = "sharedadmin"
    pool_options.defaultAutoCommit = true
    pool_options.testOnBorrow = true
    pool_options.testWhileIdle = true
    pool_options.maxActive = 100
    pool_options.maxWait = 60000
    pool_options.validationInterval = 30000

    [keystore.tls]
    file_name =  "wso2carbon.jks"
    type =  "JKS"
    password =  "wso2carbon"
    alias =  "wso2carbon"
    key_password =  "wso2carbon"

    [apim]
    gateway_type = "Regular,APK,AWS,Azure,Kong,Envoy"

    [[apim.gateway.environment]]
    name = "Default"
    type = "hybrid"
    gateway_type = "Regular"
    provider = "wso2"
    display_in_api_console = true
    description = "This is a hybrid gateway that handles both production and sandbox token traffic."
    show_as_token_endpoint_url = true
    service_url = "https://localhost:${mgt.transport.https.port}/services/"
    username= "${admin.username}"
    password= "${admin.password}"
    ws_endpoint = "ws://gw.am.wso2.com:9099"
    wss_endpoint = "wss://gw.am.wso2.com:8099"
    http_endpoint = "http://gw.am.wso2.com:${http.nio.port}"
    https_endpoint = "https://gw.am.wso2.com:${https.nio.port}"
    websub_event_receiver_http_endpoint = "http://localhost:9021"
    websub_event_receiver_https_endpoint = "https://localhost:8021"

    [apim.sync_runtime_artifacts.gateway]
    gateway_labels =["Default"]

    [apim.analytics]
    enable = false
    type = "moesif"

    [apim.ai]
    enable = true
    key = ""

    [apim.key_manager]
    enable_lightweight_apikey_generation = true

    [apim.cors]
    allow_origins = "*"
    allow_methods = ["GET","PUT","POST","DELETE","PATCH","OPTIONS"]
    allow_headers = ["authorization","Access-Control-Allow-Origin","Content-Type","SOAPAction","apikey","Internal-Key"]
    allow_credentials = false

    [apim.throttling]
    event_duplicate_url = ["tcp://apim-node1:5672"]
    throttle_decision_endpoints = ["tcp://apim-node2:5673"]

    [[apim.throttling.url_group]]
    traffic_manager_urls = ["tcp://apim-node1:9611"]
    traffic_manager_auth_urls = ["ssl://apim-node1:9711"]
    type = "loadbalance"

    [[apim.throttling.url_group]]
    traffic_manager_urls = ["tcp://apim-node2:9612"]
    traffic_manager_auth_urls = ["ssl://apim-node2:9712"]
    type = "loadbalance"

    [apim.cache_invalidation]
    enabled = true

    [[event_handler]]
    name="userPostSelfRegistration"
    subscriptions=["POST_ADD_USER"]

    [service_provider]
    sp_name_regex = "^[\\sa-zA-Z0-9._-]*$"

    [database.local]
    url = "jdbc:h2:./repository/database/WSO2CARBON_DB;DB_CLOSE_ON_EXIT=FALSE"

    [[event_listener]]
    id = "token_revocation"
    type = "org.wso2.carbon.identity.core.handler.AbstractIdentityHandler"
    name = "org.wso2.is.notification.ApimOauthEventInterceptor"
    order = 1
    [event_listener.properties]
    notification_endpoint = "https://localhost:${mgt.transport.https.port}/internal/data/v1/notify"
    username = "${admin.username}"
    password = "${admin.password}"
    'header.X-WSO2-KEY-MANAGER' = "default"

    [oauth.grant_type.token_exchange]
    enable = true
    allow_refresh_tokens = true
    iat_validity_period = "1h"
