# WSO2 APIM runs as uid 802. OpenShift's restricted SCC blocks this.
# After applying this file, grant anyuid SCC to the service account:
#
#   oc adm policy add-scc-to-user anyuid -z wso2-apim-sa -n wso2-apim
#
# This command requires cluster-admin privileges.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wso2-apim-sa
  namespace: wso2-apim
