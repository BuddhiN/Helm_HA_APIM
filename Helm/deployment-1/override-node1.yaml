wso2:
  apim:
    # Node 1: port offset 0 (default)
    portOffset: 0
    configurations:
      # Node 1 is the primary node — creates the admin account
      # and sets throttling peers pointing to node2
      extraConfigs: |
        [apim.throttling]
        event_duplicate_url = ["tcp://apim-node2:5673"]
        throttle_decision_endpoints = ["tcp://apim-node1:5672"]

        [[apim.throttling.url_group]]
        traffic_manager_urls = ["tcp://apim-node1:9611"]
        traffic_manager_auth_urls = ["ssl://apim-node1:9711"]
        type = "loadbalance"

        [[apim.throttling.url_group]]
        traffic_manager_urls = ["tcp://apim-node2:9612"]
        traffic_manager_auth_urls = ["ssl://apim-node2:9712"]
        type = "loadbalance"

        [apim.cache_invalidation]
        enabled = true
