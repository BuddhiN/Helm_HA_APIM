services:

  apim-node1:
    image: wso2-am-ha-local-1:latest
    container_name: apim-node1
    networks:
      - apim-ha-network
    ports:
      - "9443:9443"   # Publisher / DevPortal / Admin Console
      - "8280:8280"   # HTTP Gateway
      - "8243:8243"   # HTTPS Gateway
      - "5672:5672"   # JMS (own)
      - "9611:9611"   # Traffic Manager TCP
      - "9711:9711"   # Traffic Manager SSL
    volumes:
      - ./apim-instance-1/deployment.toml:/home/wso2carbon/wso2am-4.6.0/repository/conf/deployment.toml
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:9443/carbon/admin/login.jsp || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  apim-node2:
    image: wso2-am-ha-local-2:latest
    container_name: apim-node2
    networks:
      - apim-ha-network
    ports:
      - "9444:9444"   # Publisher / DevPortal / Admin Console (offset +1)
      - "8281:8281"   # HTTP Gateway (offset +1)
      - "8244:8244"   # HTTPS Gateway (offset +1)
      - "5673:5673"   # JMS (own, offset +1)
      - "9612:9612"   # Traffic Manager TCP (offset +1)
      - "9712:9712"   # Traffic Manager SSL (offset +1)
    volumes:
      - ./apim-instance-2/deployment.toml:/home/wso2carbon/wso2am-4.6.0/repository/conf/deployment.toml
    depends_on:
      - apim-node1
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:9444/carbon/admin/login.jsp || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  nginx:
    image: nginx:alpine
    container_name: apim-nginx
    networks:
      - apim-ha-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nignx-conf/apimHA.conf:/etc/nginx/conf.d/apimHA.conf
      - ./nignx-conf/ssl:/etc/nginx/ssl
      - ./nignx-conf/log:/etc/nginx/log
    # Generates a self-signed cert on first run if none exists, then starts nginx
    command: /bin/sh -c "apk add --no-cache openssl && mkdir -p /etc/nginx/ssl /etc/nginx/log/am/https /etc/nginx/log/gw/https && ([ -f /etc/nginx/ssl/server.crt ] || openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/ssl/server.key -out /etc/nginx/ssl/server.crt -subj '/CN=api.am.wso2.com/O=WSO2/C=LK') && nginx -g 'daemon off;'"
    depends_on:
      - apim-node1
      - apim-node2

networks:
  apim-ha-network:
    driver: bridge
